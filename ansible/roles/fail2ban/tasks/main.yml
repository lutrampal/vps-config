---
- name: Ensure fail2ban is installed
  ansible.builtin.apt:
    name: fail2ban
    state: present
    update_cache: true

- name: Configure fail2ban logging target
  ansible.builtin.template:
    src: fail2ban.local.j2
    dest: /etc/fail2ban/fail2ban.local
    owner: root
    group: root
    mode: "0644"
  notify: Restart fail2ban

- name: Configure fail2ban SSH jail
  ansible.builtin.template:
    src: sshd.local.j2
    dest: /etc/fail2ban/jail.d/sshd.local
    owner: root
    group: root
    mode: "0644"
  notify: Restart fail2ban

- name: Configure fail2ban Nginx jail
  ansible.builtin.template:
    src: nginx.local.j2
    dest: /etc/fail2ban/jail.d/nginx.local
    owner: root
    group: root
    mode: "0644"
  notify: Restart fail2ban

- name: Ensure fail2ban service is enabled and running
  ansible.builtin.service:
    name: fail2ban
    enabled: true
    state: started
